<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Calculadora Azul</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #e6f2ff 0, #c9ddff 40%, #90a8ff 100%);
    }

    .calculator-wrapper {
      display: flex;
      gap: 20px;
      padding: 25px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(10px);
    }

    .calculator {
      width: 360px;
      border-radius: 20px;
      overflow: hidden;
      background: linear-gradient(145deg, #0b3c88, #1a5fd1);
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    .calc-header {
      padding: 16px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, #0a2b5c, #0f3f8f);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.35);
      position: relative;
      z-index: 2;
    }

    .calc-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .calc-badges {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .badge {
      font-size: 10px;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .badge-secondary {
      background: rgba(255, 255, 255, 0.06);
    }

    .display {
      padding: 14px 20px 18px;
      background: linear-gradient(160deg, #0f2f63, #0b2144);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
    }

    .display::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.18), transparent 55%);
      pointer-events: none;
    }

    .display-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
    }

    .mode-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .mode-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4cffc3;
      box-shadow: 0 0 8px rgba(76, 255, 195, 0.8);
    }

    .memory-indicator {
      font-size: 11px;
      opacity: 0.6;
    }

    .expression {
      min-height: 22px;
      text-align: right;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      word-wrap: break-word;
      margin-bottom: 4px;
    }

    .result {
      text-align: right;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.35);
    }

    .result.small {
      font-size: 24px;
    }

    .keyboard {
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      background: linear-gradient(180deg, #0f3a7a, #0b2b5a);
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      color: #ffffff;
      background: linear-gradient(145deg, #1f5fd1, #174aa3);
      box-shadow:
        0 6px 12px rgba(0, 0, 0, 0.35),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      transition:
        transform 0.08s ease,
        box-shadow 0.08s ease,
        background 0.15s ease,
        filter 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(255, 255, 255, 0.18), transparent 55%);
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
    }

    .btn:hover::after {
      opacity: 1;
    }

    .btn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
      box-shadow:
        0 8px 16px rgba(0, 0, 0, 0.4),
        inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .btn:active {
      transform: translateY(1px) scale(0.99);
      box-shadow:
        0 3px 6px rgba(0, 0, 0, 0.4),
        inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      filter: brightness(0.98);
    }

    .btn-operator {
      background: linear-gradient(145deg, #ffb347, #ff8c42);
      color: #1b2430;
      font-weight: 600;
    }

    .btn-operator-strong {
      background: linear-gradient(145deg, #ff6b6b, #ff3b3b);
      color: #ffffff;
      font-weight: 700;
    }

    .btn-func {
      background: linear-gradient(145deg, #1f8bd1, #176ba3);
      font-size: 13px;
    }

    .btn-func span {
      font-size: 11px;
      opacity: 0.85;
    }

    .btn-secondary {
      background: linear-gradient(145deg, #0f4a92, #0b3568);
      font-size: 13px;
      color: #e0edff;
    }

    .btn-wide {
      grid-column: span 2;
    }

    .btn-equal {
      background: linear-gradient(145deg, #4cffc3, #1fd19a);
      color: #053b2b;
      font-weight: 700;
      font-size: 18px;
    }

    .btn-zero {
      grid-column: span 2;
    }

    .btn-circle {
      border-radius: 999px;
      padding-inline: 0;
    }

    .btn-small-text {
      font-size: 12px;
    }

    .btn-top-label {
      display: block;
      font-size: 10px;
      opacity: 0.7;
      margin-bottom: 2px;
    }

    .btn-main-label {
      display: block;
      font-size: 14px;
    }

    .history-panel {
      width: 220px;
      border-radius: 18px;
      background: linear-gradient(160deg, #f7fbff, #e3edff);
      padding: 14px 12px 12px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .history-title {
      font-size: 13px;
      font-weight: 600;
      color: #1b2a4a;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .history-clear {
      border: none;
      background: transparent;
      font-size: 11px;
      color: #3b5fc7;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 999px;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .history-clear:hover {
      background: rgba(59, 95, 199, 0.08);
      color: #243f8f;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      margin-top: 4px;
    }

    .history-item {
      padding: 6px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(19, 57, 145, 0.08);
      cursor: pointer;
      transition: background 0.15s ease, transform 0.08s ease, box-shadow 0.15s ease;
    }

    .history-item:hover {
      background: #e7f0ff;
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    }

    .history-expression {
      font-size: 11px;
      color: #4b5a7a;
      margin-bottom: 2px;
    }

    .history-result {
      font-size: 13px;
      font-weight: 600;
      color: #1b2a4a;
    }

    .history-empty {
      font-size: 11px;
      color: #7b8aa8;
      margin-top: 10px;
      text-align: center;
    }

    .history-footer {
      margin-top: 6px;
      font-size: 10px;
      color: #9aa6c4;
      text-align: right;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.15);
      border-radius: 999px;
    }

    @media (max-width: 720px) {
      body {
        padding: 20px;
      }

      .calculator-wrapper {
        flex-direction: column;
        align-items: center;
      }

      .history-panel {
        width: 100%;
        max-width: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="calculator-wrapper">
    <div class="calculator">
      <div class="calc-header">
        <div class="calc-title">Calculadora Pro</div>
        <div class="calc-badges">
          <div class="badge">
            Modo <strong>Avanzado</strong>
          </div>
          <div class="badge badge-secondary">Azul &amp; Blanca</div>
        </div>
      </div>

      <div class="display">
        <div class="display-top">
          <div class="mode-indicator">
            <span class="mode-dot"></span>
            <span id="angle-mode-label">RAD</span>
          </div>
          <div class="memory-indicator" id="memory-indicator">M: vacío</div>
        </div>
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>

      <div class="keyboard">
        <!-- Fila 1: funciones científicas -->
        <button class="btn btn-func btn-small-text" data-func="sin">sin</button>
        <button class="btn btn-func btn-small-text" data-func="cos">cos</button>
        <button class="btn btn-func btn-small-text" data-func="tan">tan</button>
        <button class="btn btn-func btn-small-text" data-func="sqrt">√</button>
        <button class="btn btn-func btn-small-text" data-func="pow2">x²</button>

        <!-- Fila 2: memoria y modo -->
        <button class="btn btn-secondary btn-small-text" data-mem="MC">MC</button>
        <button class="btn btn-secondary btn-small-text" data-mem="MR">MR</button>
        <button class="btn btn-secondary btn-small-text" data-mem="M+">M+</button>
        <button class="btn btn-secondary btn-small-text" data-mem="M-">M-</button>
        <button class="btn btn-secondary btn-small-text" id="toggle-angle">RAD/DEG</button>

        <!-- Fila 3: control -->
        <button class="btn btn-secondary" data-action="CE">CE</button>
        <button class="btn btn-secondary" data-action="C">C</button>
        <button class="btn btn-secondary" data-action="backspace">⌫</button>
        <button class="btn btn-operator" data-op="/">÷</button>
        <button class="btn btn-operator" data-op="*">×</button>

        <!-- Fila 4: números 7 8 9 -->
        <button class="btn" data-num="7">7</button>
        <button class="btn" data-num="8">8</button>
        <button class="btn" data-num="9">9</button>
        <button class="btn btn-operator" data-op="-">−</button>
        <button class="btn btn-func btn-small-text" data-func="inv">1/x</button>

        <!-- Fila 5: números 4 5 6 -->
        <button class="btn" data-num="4">4</button>
        <button class="btn" data-num="5">5</button>
        <button class="btn" data-num="6">6</button>
        <button class="btn btn-operator" data-op="+">+</button>
        <button class="btn btn-func btn-small-text" data-func="log">log</button>

        <!-- Fila 6: números 1 2 3 -->
        <button class="btn" data-num="1">1</button>
        <button class="btn" data-num="2">2</button>
        <button class="btn" data-num="3">3</button>
        <button class="btn btn-func btn-small-text" data-func="ln">ln</button>
        <button class="btn btn-func btn-small-text" data-func="pi">π</button>

        <!-- Fila 7: 0, punto, paréntesis, igual -->
        <button class="btn btn-zero" data-num="0">0</button>
        <button class="btn" data-num=".">.</button>
        <button class="btn btn-secondary" data-num="(">(</button>
        <button class="btn btn-secondary" data-num=")">)</button>
        <button class="btn btn-equal btn-circle" data-action="equal">=</button>
      </div>
    </div>

    <div class="history-panel">
      <div class="history-header">
        <div class="history-title">Historial</div>
        <button class="history-clear" id="clear-history">Limpiar</button>
      </div>
      <div class="history-list" id="history-list">
        <div class="history-empty" id="history-empty">
          No hay operaciones todavía.  
          Haz algunos cálculos y aparecerán aquí.
        </div>
      </div>
      <div class="history-footer">
        Haz clic en una línea para reutilizar el resultado.
      </div>
    </div>
  </div>

  <script>
    const expressionEl = document.getElementById("expression");
    const resultEl = document.getElementById("result");
    const memoryIndicator = document.getElementById("memory-indicator");
    const angleModeLabel = document.getElementById("angle-mode-label");
    const historyList = document.getElementById("history-list");
    const historyEmpty = document.getElementById("history-empty");
    const clearHistoryBtn = document.getElementById("clear-history");
    const toggleAngleBtn = document.getElementById("toggle-angle");

    let currentExpression = "";
    let currentResult = 0;
    let memory = 0;
    let angleMode = "RAD"; // o "DEG"
    let lastWasEqual = false;

    function updateDisplay() {
      expressionEl.textContent = currentExpression;
      resultEl.textContent = currentResult.toString();
      if (resultEl.textContent.length > 12) {
        resultEl.classList.add("small");
      } else {
        resultEl.classList.remove("small");
      }
    }

    function updateMemoryIndicator() {
      if (memory === 0) {
        memoryIndicator.textContent = "M: vacío";
      } else {
        memoryIndicator.textContent = "M: " + memory;
      }
    }

    function appendToExpression(value) {
      if (lastWasEqual && /[0-9.]/.test(value)) {
        currentExpression = "";
      }
      lastWasEqual = false;
      currentExpression += value;
      tryEvaluate(false);
    }

    function tryEvaluate(final = false) {
      if (!currentExpression) {
        currentResult = 0;
        updateDisplay();
        return;
      }

      let expr = currentExpression;

      expr = expr.replace(/π/g, "Math.PI");
      expr = expr.replace(/√\(/g, "Math.sqrt(");

      expr = expr.replace(/sin\(/g, "SIN(");
      expr = expr.replace(/cos\(/g, "COS(");
      expr = expr.replace(/tan\(/g, "TAN(");

      expr = expr.replace(/log\(/g, "Math.log10(");
      expr = expr.replace(/ln\(/g, "Math.log(");

      expr = expr.replace(/SIN\(/g, "sinCalc(");
      expr = expr.replace(/COS\(/g, "cosCalc(");
      expr = expr.replace(/TAN\(/g, "tanCalc(");

      function sinCalc(x) {
        if (angleMode === "DEG") x = (x * Math.PI) / 180;
        return Math.sin(x);
      }
      function cosCalc(x) {
        if (angleMode === "DEG") x = (x * Math.PI) / 180;
        return Math.cos(x);
      }
      function tanCalc(x) {
        if (angleMode === "DEG") x = (x * Math.PI) / 180;
        return Math.tan(x);
      }

      try {
        const fn = new Function(
          "sinCalc",
          "cosCalc",
          "tanCalc",
          "return " + expr
        );
        const val = fn(sinCalc, cosCalc, tanCalc);
        if (typeof val === "number" && isFinite(val)) {
          currentResult = +val.toFixed(10);
          updateDisplay();
          if (final) {
            addToHistory(currentExpression, currentResult);
          }
        } else if (final) {
          resultEl.textContent = "Error";
        }
      } catch (e) {
        if (final) {
          resultEl.textContent = "Error";
        }
      }
    }

    function addToHistory(expr, res) {
      if (historyEmpty) {
        historyEmpty.style.display = "none";
      }

      const item = document.createElement("div");
      item.className = "history-item";
      item.innerHTML = `
        <div class="history-expression">${expr}</div>
        <div class="history-result">= ${res}</div>
      `;
      item.addEventListener("click", () => {
        currentExpression = res.toString();
        currentResult = res;
        lastWasEqual = false;
        updateDisplay();
      });

      historyList.prepend(item);
    }

    function clearHistory() {
      historyList.innerHTML = "";
      historyList.appendChild(historyEmpty);
      historyEmpty.style.display = "block";
    }

    function handleNumber(num) {
      appendToExpression(num);
    }

    function handleOperator(op) {
      lastWasEqual = false;
      if (!currentExpression && op !== "-") return;

      if (/[+\-*/]$/.test(currentExpression)) {
        currentExpression = currentExpression.slice(0, -1) + op;
      } else {
        currentExpression += op;
      }
      tryEvaluate(false);
    }

    function handleAction(action) {
      switch (action) {
        case "CE":
          currentExpression = "";
          currentResult = 0;
          lastWasEqual = false;
          updateDisplay();
          break;
        case "C":
          currentExpression = "";
          currentResult = 0;
          lastWasEqual = false;
          updateDisplay();
          break;
        case "backspace":
          if (lastWasEqual) {
            currentExpression = "";
            lastWasEqual = false;
          } else {
            currentExpression = currentExpression.slice(0, -1);
          }
          tryEvaluate(false);
          break;
        case "equal":
          lastWasEqual = true;
          tryEvaluate(true);
          break;
      }
    }

    function handleFunc(func) {
      lastWasEqual = false;
      switch (func) {
        case "sqrt":
          currentExpression += "√(";
          break;
        case "pow2":
          currentExpression += "**2";
          break;
        case "inv":
          currentExpression += "1/(";
          break;
        case "sin":
          currentExpression += "sin(";
          break;
        case "cos":
          currentExpression += "cos(";
          break;
        case "tan":
          currentExpression += "tan(";
          break;
        case "log":
          currentExpression += "log(";
          break;
        case "ln":
          currentExpression += "ln(";
          break;
        case "pi":
          currentExpression += "π";
          break;
      }
      tryEvaluate(false);
    }

    function handleMemory(action) {
      switch (action) {
        case "MC":
          memory = 0;
          updateMemoryIndicator();
          break;
        case "MR":
          if (lastWasEqual) {
            currentExpression = "";
            lastWasEqual = false;
          }
          currentExpression += memory.toString();
          tryEvaluate(false);
          break;
        case "M+":
          memory += currentResult;
          updateMemoryIndicator();
          break;
        case "M-":
          memory -= currentResult;
          updateMemoryIndicator();
          break;
      }
    }

    function toggleAngleMode() {
      angleMode = angleMode === "RAD" ? "DEG" : "RAD";
      angleModeLabel.textContent = angleMode;
      tryEvaluate(false);
    }

    document.addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      const num = btn.getAttribute("data-num");
      const op = btn.getAttribute("data-op");
      const action = btn.getAttribute("data-action");
      const func = btn.getAttribute("data-func");
      const mem = btn.getAttribute("data-mem");

      if (num !== null) {
        handleNumber(num);
      } else if (op !== null) {
        handleOperator(op);
      } else if (action !== null) {
        handleAction(action);
      } else if (func !== null) {
        handleFunc(func);
      } else if (mem !== null) {
        handleMemory(mem);
      }
    });

    clearHistoryBtn.addEventListener("click", clearHistory);
    toggleAngleBtn.addEventListener("click", toggleAngleMode);

    updateDisplay();
    updateMemoryIndicator();
  </script>
</body>
</html>
